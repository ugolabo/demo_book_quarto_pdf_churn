####################################
# application de commentaires sur projet
# https://web.hypothes.is/
# https://quarto.org/docs/output-formats/html-basics.html#commenting
###############################################################################
engine: knitr  # knitr, jupyter
knitr:  # pour blocs de code
  opts_chunk:
    comment: ""  # "#>" changer le préfixe des résultats de code
    results: hold  # markup, asis, hold, hide ; résultats
    R.options:
      knitr.graphics.auto_pdf: true  # pour format pdf
  opts_knit:
    verbose: true  # affichage durant la compilation (render)
editor: source  # source (brut), visual (UI) ; editeur markdown
editor_options:
  chunk_output_type: console  # inline, console ; résultats
callout-appearance: default  # apparence des capsules colorées
###############################################################################
lang: en  # langue principale ; aussi possible dans chaque .qmd
#otherlangs: [zh]  # langues secondaires ; mandarin ; aussi possible dans chaque .qmd
language:  # changer des champs par défaut
  en:  # pour cette langue
    search-text-placeholder: "search"  # dans la boite de recherche
    title-block-author-single: "Written by"
    title-block-author-plural: "Written and revised by"
#    title-block-affiliation-single: ""
#    title-block-affiliation-plural: ""
    title-block-published: "Last update"
#    title-block-modified: "Last update"
#    toc-title-document: "Content"
#    toc-title-website: ""
#    navbar-title: ""
#    #section-title-appendices: ""
#    et plus : boite de recherche, liens vers repo, bas de page
###############################################################################
execute:  # paramétrer blocs de code et résultats
  echo: false  # true, false, fenced  # afficher bloc
  include: true  # inclure bloc
  eval: true  # évaluer bloc
  enabled: true  # tout évaluer ; projet doc sans aucun code, que markdown
  output: true  # true, false, asis ; format résultats
  warning: false  # avertissements
  error: false  # avertissements
  cache: false  # true, false, refresh ; true et refresh pour minimiser recalculs ; une cache par .qmd
  freeze: auto  # true, false, auto ; auto compile code à la compilation si le code change ; true ne compile pas code à la compilation ; avec fichier .Rproj seulement
  keep-md: false  # garder, supprimer le fichier transitoire
#  keep-ipynb: false  # supprimer le fichier
###############################################################################
