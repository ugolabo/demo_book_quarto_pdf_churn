# .bib contient des sources du genre...
#@article{knuth84,
#  author = {Knuth, Donald E.},
#  title = {Literate Programming},
#  year = {1984},
#  issue_date = {May 1984},
#  publisher = {Oxford University Press, Inc.},
#  address = {USA},
#  volume = {27},
#  number = {2},
#  issn = {0010-4620},
#  url = {https://doi.org/10.1093/comjnl/27.2.97},
#  doi = {10.1093/comjnl/27.2.97},
#  journal = {Comput. J.},
#  month = may,
#  pages = {97–111},
#  numpages = {15}
#}

# citation dans le texte avec...
# See @knuth84 for additional discussion of literate programming.
# See @sec-introduction for additional discussion.
# See [Chap. @sec-introduction] for...
# See [-@sec-introduction] for...
# See [-@sec-citation] for...
# et plus...

# autres citations pour fig, tab, form
crossref:  # assurer la cohérence des références croisées entre .qmd
  chapters: true
###############################################################################
# liens internes (cross references) vers section, .qmd, .qmd+section
#[about](s#plus)
#[about](summary.qmd)
#[about](summary.qmd#plus)
###############################################################################
# déterminer majorité des paramètres de fig et tbl
# comme la taille
# directement à la fig et à la tbl
###############################################################################
# aucun html, css, js sur mesure n'est ajouté
# mais aussi possible...
###############################################################################
format:
  html:
    cover-image: img/img6.png
#    cover-image-alt: ""  # metadonnées descriptive
    embed-resources: false  # incruster images ou faire répertoire
    self-contained-math: false  # incruster équations maths
    chalkboard: false  # pouvoir dessiner ; avec embed-resources: false
    theme:  # apparence des éléments du document ; https://bootswatch.com/ ; un thème ou un thème modifié par des fichiers css/js ou plusieurs thèmes
      light: readable  # mode clair
      dark: darkly  # mode foncé
    respect-user-color-scheme: true  # ordinateur qui lit fichier détermine light ou dark par défaut
    highlight-style: arrow  # pygments, kate, zenburn, breezedark, arrow... ; apparence des blocs de code
#    classoption: []  # modifier affichage des équations maths, par exemple
    colorlinks: true  # colorer liens (toc, hyperliens, liens internes, citations)
    links-as-notes: false  # liens en note de bas de page
    toc: true  # table of contents
#    toc-title: "Content"  # changer champ par défaut
    toc-depth: 3  # niveaux de divisions inclus; 3 pour afficher divisions #, ##, ###
    toc-expand: 2  # niveaux de divisions ouverts; 1 pour divisions #
    toc-location: right  # left, right, left-body, right-body
    number-sections: true  # numéroter divisions
    number-depth: 3  # limiter numérotation à division ###
#    number-offset: 0  # compteur de départ de numération à 1
#    shift-heading-level-by: 1  # #->##, ##->###, etc.
    smooth-scroll: true  # menus déroulants plus fluides
    anchor-sections: true  # ajouter liens internes (cross references) visibles aux divisions
    link-external-icon: true  # ajouter icône aux liens
    link-external-newwindow: true  # ouvrir lien dans nouvel onglet
    citations-hover: true  # effet sur texte et bibliographie
    footnotes-hover: true  # effet sur note en bas de page
    crossrefs-hover: true  # effet sur liens internes (cross references)
    fig-align: left  # left, right, center ; aligner figures, images
    fig-caption: true  # afficher légende de figure, image
    fig-cap-location: bottom  # top, bottom, margin ; légende de figure, image
    lightbox: auto  # true, false, auto ; activer pop-up-zoom des images ; {.lightbox}, {.nolightbox} avec image
    tbl-cap-location: top  # top, bottom, margin ; légende de tableau
#    column: screen  # body, page-inset, page, screen-inset, screen ; étendue en largeur des images ; attention à ne pas court-circuiter les paramètres de chaque image
    code-fold: false  # true, show, false ; cacher-déplier, montrer-déplier ou montrer blocs de code
#    code-summary: "Afficher le code source" # changer champ par défaut
    code-tools: false  # ajouter icône ; ouvrir le code source du .qmd
    code-copy: true  # true, false; hover ; montrer, cacher icône de copie du bloc de code
    code-overflow: scroll  # wrap, scroll ; gérer les longues lignes de code
    code-block-bg: true  # fond de bloc de code
    code-block-border-left: true  # séparateur des numéros dans blocs de code
    code-line-numbers: true  # numéro de ligne dans blocs de code
#    code-link: false  # lien vers la doc du code ; nécessite package R downlit
    format-links: false  # icône pour télécharger autres versions que html (si existantes) ; voir downloads: [pdf, epub] plus haut...
#    mainfont:  # police du texte autre que celle du theme:
#    sansfont  # police pour titres et menus
#    monofont  # police pour blocs de code
#    mathfont  # police pour maths
#    fontsize: 11pt  # taille de police autre que celle du theme:
#    linestretch: 1.5  # interligne autre que celle du theme:
#    fontcolor:  # couleur du texte autre que celle du theme:
#    linkcolor:  # couleur des liens autre que celle du theme:
#    css: styles.css  # personnaliser theme: ou plus
#    include-in-header:  # ajouter scripts d'analyse, polices Web complexes
#    include-before-body:  # ajouter bandeaux d'annonce, éléments qui doivent apparaitre avant le contenu
 #   include-after-body:  # manipuler DOM, script.js
####################################
  pdf:
    pdf-engine: lualatex  # compilateur pdflatex, xelatex, lualatex
    latex-auto-install: false  # tlmgr est le gestionnaire de packages de TeX Live intégré à TinyTeX, le module R (mettre à true) ; si l'ordi compte MikTeX, il a son propre gestionnaire GUI (mettre à false), la compilation plante, il faut gérer dans MikTeX et re-compiler ; si l'ordi compte Live TeX (true ou false), il faut une permission dans le terminal, la compilation plante, il faut gérer dans Live TeX et re-compiler
    keep-tex: false  # garder, supprimer les fichiers transitoires .tex, .aux, etc.
    documentclass: scrbook  # article / scrartcl / extarticle, report / scrreprt, book / scrbook / extbook, memoir, novel ; https://ctan.org/pkg/koma-script
    classoption:
      - onecolumn  # onecolumn, twocolumn
      - portrait  # portrait, landscape
      - openany  # openany, openright
      - twoside  # oneside, twoside
      # et plus : headings, parskip, numbers, BCOR...
    pagestyle: plain  # plain, headings, empty, fancy ; détermine numéro de page, titres de chapitres (entêtes) et bas de page
    papersize: letter  # a4, a5, legal
    geometry:  # geometry plus stable que margin- plus bas...
      - top=2.5cm  # dm, mm, in ,pt
      - bottom=2.5cm
      - left=2.5cm
      - right=2.5cm
#    margin-left:  # façon html instable
#    margin-right:
#    margin-top:
#    margin-bottom:
    fontfamily: kpfonts-otf  # voir choix classiques plus bas... ; façon package stable vs mainfont, ne dépend pas du OS ; aussi activé avec \usepackage{}
#    mainfont: "DejaVu Sans"  # "Liberation Serif", "Ubuntu", "Arial"... ; façon instable avec package fontspec qui cherche les polices du OS de l'ordinateur
#    sansfont: "DejaVu Sans"  # titres
#    monofont: "DejaVu Sans"  # blocs de codes
    fontsize: 12pt  # 11 +- 1 ou 2 selon fontfamily et autres packages
    indent: false  # indenter le premier paragraphe
    colorlinks: true  ## colorer liens
    linkcolor: blue!80!black  # liens internes (cross references) ; avec le mixe de couleurs du package xcolor
    toccolor: red!50!black  # table of contents
    urlcolor: blue!80!black  # hyperliens
    citecolor: green!50!black  # citations
    links-as-notes: true  # liens en bas de page
    highlight-style: arrow  # pygments, kate, zenburn, breezedark, arrow... ; apparence des blocs de code
# % est un commentaire dans TeX
# comme # est un commentaire dans Markdown
    include-in-header: 
      text: |
        %preamble.tex  % fichier à coté de _quarto.yml
        %%%%%
        % la gestion des packages dépend de MiKTeX ou Live TeX
        % MiKTeX démarre avec des packages de base
        % il faut ajouter les autres packages
        % certains packages, et des options LaTeX, sont déterminés ailleurs dans le YAML ; Quarto appelle alors des packages automatiquement ; mais pas tous...
        % cette zone LaTeX est donc complémentaire pour enrichir le YAML...
        \usepackage{xcolor}  % plus d'options de coloration
        \usepackage{graphicx}  % plus d'options de figures
        \usepackage{wrapfig}  % plus d'option de figures
        %%%%%
        % en complément à police et/ou changement sur la police...
        \renewcommand{\familydefault}{\sfdefault}
        %%%%%
        % pour ajouter logo sur la page de garde...
        % ici
#    include-before-body:  # frontmatter
#      text: |
#    include-after-body:  # backmatter
#      text: |
#      file: file.tex
    toc: true  # table of contents
#    toc-title:   # changer champ par défaut
    toc-depth: 4  # niveaux de divisions max; 3 pour afficher #, ##, ###
    lof: false  # list of figures, suivant table of contents
    lot: false  # list of tables, suivant table of contents
    number-sections: true  # numéroter divisions
    number-depth: 3  # limiter numérotation à division ###
#    number-offset: 0  # compteur de départ de numération à 1
#    shift-heading-level-by: 1  # #->##, ##->###, etc.
    fig-caption: true  # afficher légende de figure, image
    fig-align: center  # left, right, center ; aligner figures, images
    fig-cap-location: bottom  # top, bottom, margin ; légende de figure, image
    tbl-cap-location: top  # top, bottom, margin ; légende de tableau
    code-block-bg: true  # fond de bloc de code
    code-block-border-left: true  # séparateur des numéros dans blocs de code
    code-line-numbers: true  # numéro de ligne dans blocs de code
####################################
  epub:
    cover-image: img/img6.png
#    cover-image-alt: ""  # metadonnées descriptive
    title-page: true  # page titre séparée au début
    epub-subdirectory: content  # organisation fichiers internes
    toc: true  # table of contents
