#suppress-bibliography: false  # crée automatiquement la bibliographie
#suppress-bibliography: true  # traiter les citations dans le texte sans créer bibliographie automatique et rajouter dans le document...
# le mieux est false et l'ajouter de ce qui suit à la fin du document .qmd pour forcer le titre

