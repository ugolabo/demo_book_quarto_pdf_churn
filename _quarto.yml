#  typst: default  # nouveau venu qui veut remplacer LaTeX, moteur de composition ultra-rapide, syntaxe beaucoup plus simple que le LaTeX traditionnel

#  man: default  # pour créer des pages de manuel Unix/Linux, pour documenter des outils en ligne de commande, pour des documentations système

#  mediawiki: default  # format utilisé par Wikipédia, pour contribuer à un wiki d'entreprise ou public,
#  vimwiki: default  # format spécifique pour les utilisateurs de l'éditeur de texte Vim
###############################################################################
#| Valeur YAML | Nom de la police  | Style                                                      |
#|-------------|-------------------|------------------------------------------------------------|
#| libertinus  | Libertinus        | Moderne, très complet (Sérif, Sans, Mono, Math).           |
#| biolinum    | Biolinum          | Une sans-sérif élégante (souvent mariée à Libertine).      |
#| charter     | Bitstream Charter | Très lisible, excellente pour les longs rapports.          |
#| utopia      | Utopia            | Classique, académique et solide.                           |
#| palatino    | Palatino          | Une police de style ancien, très aérée.                    |
#| garamond    | EB Garamond       | Très élégante, idéale pour les livres littéraires.         |
#| lmodern     | Latin Modern      | La police LaTeX par défaut, mais en version haute qualité. |
#| inter       | Inter             | Très moderne, style "interface tech" (Sans-Sérif).         |
#| kpfonts       | KpFonts         | Moderne, complet, pour les maths  |
#| kpfonts-otf   | KpFonts         | Moderne, complet, pour les maths  |

# choix dépend du compilateur pdflatex, xelatex, lualatex
# peut requérir l'installation d'un package avec MiKTeX ou TeX Live
# peut requiérir l'installation sur le OS de l'ordinateur
