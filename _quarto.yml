    fig-caption: true  # afficher légende de figure, image
    fig-align: center  # left, right, center ; aligner figures, images
    fig-cap-location: bottom  # top, bottom, margin ; légende de figure, image
    tbl-cap-location: top  # top, bottom, margin ; légende de tableau
    lightbox: auto  # true, false, auto ; activer pop-up-zoom des images ; {.lightbox}, {.nolightbox} avec image
    code-block-bg: true  # fond de bloc de code
    code-block-border-left: true  # séparateur des numéros dans blocs de code
    code-line-numbers: true  # numéro de ligne dans blocs de code
